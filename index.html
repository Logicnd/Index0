<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index0</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="js/app.js" defer></script>
</head>

<body>

<div class="app" id="app">

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-scrollable">
            <div class="brand">
                <span>Index</span><strong>0</strong>
            </div>

            <div class="section-title">CHANNELS</div>
            <div id="channelList"></div>

            <div class="section-title">DIRECT</div>
            <div id="dmList"></div>
        </div>

        <div class="profile-panel" id="profilePanel" hidden>
            <div class="profile-info">
                <span id="profileUsername" class="profile-name"></span>
                <span class="profile-status">#Online</span>
            </div>
            <div class="profile-actions">
                <button id="editProfileBtn" class="icon-btn" title="Edit Profile">⚙️</button>
                <button id="logoutBtn" class="icon-btn" title="Logout">⎋</button>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="top-left">
                <button id="toggleSidebarBtn" class="icon-btn" title="Toggle sidebar">☰</button>

                <div>
                    <span id="roomLabel">#main</span>
                    <span id="roomTypeLabel">channel</span>
                </div>
            </div>
        </header>

        <!-- Auth Modal -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="authTitle">Login</h2>
        <form id="authForm">
            <input type="text" id="username" placeholder="Username" maxlength="20" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <button type="submit" id="authSubmit">Login</button>
            <p id="authToggle">Need an account? <span class="toggle-link">Sign up</span></p>
            <div id="authError" class="error-message"></div>
        </form>
    </div>
</div>

        <section class="chat-log" id="chatLog"></section>

        <footer class="input-area">
            <input id="messageInput" type="text" placeholder="Type a message..." maxlength="500">
            <button id="sendBtn">Send</button>
        </footer>
    </main>

    <aside class="userbar" id="userbar">
        <div class="section-title">USERS - 1</div>
        <div id="userList"></div>
    </aside>

</div>

</body>
</html>
