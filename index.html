<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index0</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            Index<span>0</span>
        </div>

        <div class="sidebar-section">
            <div class="section-title">CHANNELS</div>
            <div id="channelList"></div>
        </div>

        <div class="sidebar-section">
            <div class="section-title">DIRECT</div>
            <div id="dmList"></div>
        </div>
    </aside>

    <!-- MAIN CHAT -->
    <main class="main">

        <header class="topbar">
            <div>
                <span id="roomLabel">#main</span>
                <span id="roomTypeLabel">channel</span>
            </div>

            <div class="nick-box">
                <input type="text" id="nickInput" placeholder="handle..." maxlength="20">
                <button id="setNickBtn">Set</button>
            </div>
        </header>

        <section class="chat-log" id="chatLog"></section>

        <footer class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
            <button id="sendBtn">Send</button>
        </footer>

    </main>

    <!-- RIGHT USER LIST -->
    <aside class="userbar">
        <div class="section-title">USERS</div>
        <div id="userList"></div>
    </aside>

</div>

<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/commands.js"></script>
<script src="js/app.js"></script>

</body>
</html>
